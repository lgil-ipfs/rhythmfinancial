<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded Background Container -->
  <rect width="100" height="100" rx="22" fill="#1A1A24" stroke="#B8925A" stroke-width="2"/>
  
  <!-- Crossed Drumsticks in Upper Background -->
  <line x1="30" y1="22" x2="70" y2="38" stroke="#B8925A" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <circle cx="30" cy="22" r="1.5" fill="#B8925A" opacity="0.85"/>
  <line x1="70" y1="22" x2="30" y2="38" stroke="#B8925A" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <circle cx="70" cy="22" r="1.5" fill="#B8925A" opacity="0.85"/>

  <!-- Stands & Hardware (Gold) -->
  <!-- Hi-hat Stand -->
  <line x1="14" y1="38" x2="14" y2="85" stroke="#B8925A" stroke-width="2"/>
  <line x1="14" y1="85" x2="9" y2="90" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="85" x2="19" y2="90" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Snare Stand -->
  <line x1="27" y1="62" x2="27" y2="83" stroke="#B8925A" stroke-width="2"/>
  <line x1="27" y1="83" x2="22" y2="88" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="83" x2="32" y2="88" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cymbal Stand -->
  <line x1="82" y1="32" x2="82" y2="85" stroke="#B8925A" stroke-width="2"/>
  <line x1="82" y1="85" x2="77" y2="90" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="85" x2="87" y2="90" stroke="#B8925A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Floor Tom Legs -->
  <line x1="68" y1="70" x2="66" y2="86" stroke="#B8925A" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="70" x2="84" y2="86" stroke="#B8925A" stroke-width="2" stroke-linecap="round"/>

  <!-- Bass Drum Spurs (Legs) -->
  <line x1="33" y1="72" x2="25" y2="83" stroke="#B8925A" stroke-width="3" stroke-linecap="round"/>
  <line x1="67" y1="72" x2="75" y2="83" stroke="#B8925A" stroke-width="3" stroke-linecap="round"/>

  <!-- Bass Drum -->
  <!-- Bass drum shell (Royal Blue with Gold hoops) -->
  <rect x="33" y="55" width="34" height="26" rx="3" fill="#0F2557" stroke="#B8925A" stroke-width="2"/>
  <!-- Front drum head -->
  <ellipse cx="50" cy="68" rx="15" ry="12" fill="#F7F3EC"/>
  <!-- Logo on drum head (Stylized 'R') -->
  <path d="M48 64 v8 M48 64 c3 0 5 1.5 5 3.5 s-2 3.5-5 3.5 M49.5 69.5 l3.5 2.5" stroke="#0F2557" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Floor Tom -->
  <rect x="67" y="56" width="16" height="15" rx="1.5" fill="#0F2557" stroke="#B8925A" stroke-width="1.8"/>
  <ellipse cx="75" cy="56" rx="8" ry="2.5" fill="#F7F3EC" stroke="#B8925A" stroke-width="1.5"/>

  <!-- Snare Drum -->
  <rect x="19" y="58" width="16" height="8" rx="1" fill="#B8925A" stroke="#0F2557" stroke-width="1.2"/>
  <ellipse cx="27" cy="58" rx="8" ry="2" fill="#F7F3EC" stroke="#0F2557" stroke-width="1.2"/>

  <!-- Rack Toms -->
  <!-- Tom Mount hardware -->
  <path d="M41 52 L50 56 L59 52" stroke="#B8925A" stroke-width="2.5" fill="none"/>
  <!-- Tom 1 (Left) -->
  <rect x="35" y="42" width="12" height="10" rx="1" fill="#0F2557" stroke="#B8925A" stroke-width="1.5"/>
  <ellipse cx="41" cy="42" rx="6" ry="1.8" fill="#F7F3EC" stroke="#B8925A" stroke-width="1.5"/>
  <!-- Tom 2 (Right) -->
  <rect x="53" y="42" width="12" height="10" rx="1" fill="#0F2557" stroke="#B8925A" stroke-width="1.5"/>
  <ellipse cx="59" cy="42" rx="6" ry="1.8" fill="#F7F3EC" stroke="#B8925A" stroke-width="1.5"/>

  <!-- Hi-Hat Cymbals -->
  <ellipse cx="14" cy="42" rx="10" ry="2" fill="#B8925A" stroke="#E8E0D0" stroke-width="0.8"/>
  <ellipse cx="14" cy="40.5" rx="10" ry="2" fill="#B8925A" stroke="#E8E0D0" stroke-width="0.8"/>
  <polygon points="12.5,40.5 15.5,40.5 14,38" fill="#B8925A"/>

  <!-- Crash Cymbal -->
  <g transform="rotate(-12 82 32)">
    <ellipse cx="82" cy="32" rx="14" ry="3.2" fill="#B8925A" stroke="#E8E0D0" stroke-width="0.8"/>
    <polygon points="80.5,32 83.5,32 82,29.5" fill="#B8925A"/>
  </g>
</svg>
