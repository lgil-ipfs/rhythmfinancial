<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded Background Container -->
  <rect width="100" height="100" rx="22" fill="#1A1A24" stroke="#B8925A" stroke-width="2"/>
  
  <!-- Drum -->
  <!-- Top rim / head -->
  <ellipse cx="50" cy="65" rx="20" ry="6" fill="#F7F3EC" stroke="#4A6741" stroke-width="3"/>
  <!-- Drum body -->
  <path d="M30 65 v10 c0 4 9 7 20 7 s20-3 20-7 v-10" fill="#E8E0D0" stroke="#4A6741" stroke-width="3"/>
  <!-- Tension rods -->
  <line x1="37" y1="68" x2="37" y2="76" stroke="#B8925A" stroke-width="2"/>
  <line x1="50" y1="71" x2="50" y2="80" stroke="#B8925A" stroke-width="2"/>
  <line x1="63" y1="68" x2="63" y2="76" stroke="#B8925A" stroke-width="2"/>

  <!-- Drumsticks -->
  <line x1="20" y1="48" x2="42" y2="64" stroke="#B8925A" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="20" cy="48" r="2" fill="#B8925A"/>
  <line x1="80" y1="48" x2="58" y2="64" stroke="#B8925A" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="80" cy="48" r="2" fill="#B8925A"/>

  <!-- Floating Music Notes / Dollar Signs -->
  <!-- Left beamed note -->
  <path d="M36 38.5 c-3 0 -4.5 -1.5 -4.5 -3.8 s1.5 -3.8 4.5 -3.8 s4.5 1.5 4.5 3.8 h-2.2 c0 -1.2 -0.8 -1.8 -2.3 -1.8 s-2.3 0.5 -2.3 1.8 s0.8 1.8 2.3 1.8 s4.5 1.5 4.5 3.8 s-1.5 3.8 -4.5 3.8 s-4.5 -1.5 -4.5 -3.8 h2.2 c0 1.2 0.8 1.8 2.3 1.8 s2.3 -0.5 2.3 -1.8 s-0.8 -1.8 -2.3 -1.8 z" fill="#B8925A"/>
  <rect x="35" y="24" width="2" height="15" rx="0.7" fill="#B8925A"/>
  <line x1="39.5" y1="35" x2="39.5" y2="17" stroke="#B8925A" stroke-width="2.5"/>

  <!-- Right beamed note -->
  <path d="M59 31.5 c-3 0 -4.5 -1.5 -4.5 -3.8 s1.5 -3.8 4.5 -3.8 s4.5 1.5 4.5 3.8 h-2.2 c0 -1.2 -0.8 -1.8 -2.3 -1.8 s-2.3 0.5 -2.3 1.8 s0.8 1.8 2.3 1.8 s4.5 1.5 4.5 3.8 s-1.5 3.8 -4.5 3.8 s-4.5 -1.5 -4.5 -3.8 h2.2 c0 1.2 0.8 1.8 2.3 1.8 s2.3 -0.5 2.3 -1.8 s-0.8 -1.8 -2.3 -1.8 z" fill="#B8925A"/>
  <rect x="58" y="17" width="2" height="15" rx="0.7" fill="#B8925A"/>
  <line x1="62.5" y1="28" x2="62.5" y2="10" stroke="#B8925A" stroke-width="2.5"/>

  <!-- Note Beam -->
  <polygon points="39.5,17 62.5,10 62.5,14 39.5,21" fill="#B8925A"/>

  <!-- Small floating single note -->
  <path d="M75 39.5 c-2 0 -3 -1 -3 -2.5 s1 -2.5 3 -2.5 s3 1 3 2.5 h-1.5 c0 -0.8 -0.5 -1.2 -1.5 -1.2 s-1.5 0.4 -1.5 1.2 s0.5 1.2 1.5 1.2 s3 1 3 2.5 s-1 2.5 -3 2.5 s-3 -1 -3 -2.5 h1.5 c0 0.8 0.5 1.2 1.5 1.2 s1.5 -0.4 1.5 -1.2 s-0.5 -1.2 -1.5 -1.2 z" fill="#B8925A"/>
  <rect x="74.2" y="32.5" width="1.5" height="10" rx="0.5" fill="#B8925A"/>
  <line x1="77" y1="36" x2="77" y2="22" stroke="#B8925A" stroke-width="1.8"/>
  <path d="M77 22 c3 2 2 5 0 7 c1 -2.5 0 -5 0 -7" fill="#B8925A"/>
</svg>
